# Local development Docker Compose for self-hosted Langfuse.
# NOT for production use — passwords are placeholder values only.
# After starting, point trine-eval at: LANGFUSE_HOST=http://localhost:3000
#
# Usage:
#   docker compose -f ops/langfuse-compose.yaml up -d
#   docker compose -f ops/langfuse-compose.yaml down

services:
  langfuse-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse-server:
    image: langfuse/langfuse:2
    depends_on:
      langfuse-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:changeme@langfuse-postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: changeme
      SALT: changeme
    ports:
      - "3000:3000"

volumes:
  langfuse-postgres-data:
